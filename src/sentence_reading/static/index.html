<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- WHY: 문장을 위에 두고 읽기 — 그림은 아래 (docs/UX.md) -->
  <title>A-sentence-reading</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="app-header">
    <p class="stage-badge" id="stageBadge"></p>
    <div class="upload-bar" id="uploadBar">
      <button type="button" class="upload-btn" id="uploadBtn" title="PDF 또는 Word(.docx) 열기 (여러 개 가능)">
        파일 열기
      </button>
      <button
        type="button"
        class="upload-btn upload-btn-ghost"
        id="veilBtn"
        title="가림창 → 옆 모니터로 이동 → F11 전체화면 (창 모드에서 더블클릭도 동일)"
      >
        가림창
      </button>
      <button
        type="button"
        class="upload-btn upload-btn-danger"
        id="cacheDeleteBtn"
        title="현재 논문의 보관(증류)본 삭제 — 다음에 다시 분석"
        hidden
      >
        보관 삭제
      </button>
      <input
        type="file"
        id="pdfInput"
        class="upload-input"
        accept="application/pdf,.pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.docx"
        multiple
        hidden
      />
      <span class="upload-status" id="uploadStatus" aria-live="polite"></span>
    </div>
  </header>
  <nav class="paper-tabs" id="paperTabs" aria-label="열린 논문" hidden></nav>

  <!-- WHY: 세로 공간을 문장에 양보 — 아래 그림은 스플리터로 접음 (docs/design/11) -->
  <main class="layout" id="layout">
    <!-- ========== 상단: 한 문장 (Immersive Reader식) ========== -->
    <section class="panel panel-sentence" aria-label="한 문장">
      <div class="panel-meta">
        <span class="panel-count" id="sentenceCount">Sent — / —</span>
      </div>
      <div class="carousel">
        <button type="button" class="nav-btn" id="sentPrev" aria-label="이전 문장">‹</button>
        <div class="sentence-frame" id="sentenceFrame" tabindex="0" title="클릭: 문장 확대 / 다시 클릭: 원래 크기">
          <p class="sentence-text" id="sentenceText"></p>
        </div>
        <button type="button" class="nav-btn" id="sentNext" aria-label="다음 문장">›</button>
      </div>
      <p class="hint">←/→ 문장 · Tab 논문 · 1–9 탭 · ↑↓ 글/그림 · F 전체화면 · 가림창/더블클릭(창모드)→옆→F11</p>
    </section>

    <!-- 드래그 핸들: 아래로 끌면 아래 그림 접힘 -->
    <div
      class="split"
      id="splitter"
      role="separator"
      aria-orientation="horizontal"
      aria-controls="figurePanel"
      aria-label="문장·그림 구분 — 아래로 드래그하면 그림 접기"
      tabindex="0"
    >
      <span class="split-grip" aria-hidden="true"></span>
    </div>

    <!-- ========== 하단: 그림 ========== -->
    <section class="panel panel-figure" id="figurePanel" aria-label="그림">
      <div class="figure-body" id="figureBody">
        <div class="panel-meta">
          <span class="panel-count" id="figureCount">Fig — / —</span>
        </div>
        <div class="carousel">
          <button type="button" class="nav-btn" id="figPrev" aria-label="이전 그림">‹</button>
          <figure class="figure-frame" id="figureFrame" title="클릭하면 그림 영역 확대">
            <div class="figure-viewport" id="figureViewport">
              <img id="figureImage" alt="논문 그림" draggable="false" />
              <div class="figure-rubberband" id="figureRubberband" hidden></div>
            </div>
            <figcaption id="figureCaption"></figcaption>
          </figure>
          <button type="button" class="nav-btn" id="figNext" aria-label="다음 그림">›</button>
        </div>
        <p class="hint">Shift+←/→ 그림 · 전체화면 ←/→ · 드래그 확대 · ↓ 그림 전체화면</p>
      </div>

      <!-- 접혔을 때 하단 바 — 위로 드래그/클릭하면 펼침 -->
      <button type="button" class="figure-strip" id="figureStrip" hidden aria-label="그림 프레임 — 위로 끌어 펼치기">
        <span class="figure-strip-label">그림 프레임</span>
        <span class="panel-count" id="figureCountCollapsed">Fig — / —</span>
        <span class="figure-strip-hint">↑ 당겨서 펼치기</span>
      </button>
    </section>
  </main>

  <!-- 뽀모도로: 알림·휴식만 표시 (읽기 중에는 숨김) -->
  <div id="pomoAlert" class="pomo-alert" hidden aria-live="assertive">
    <div class="pomo-alert-card">
      <p class="pomo-alert-title">휴식할 시간입니다</p>
      <p class="pomo-alert-sub">전체화면을 해제하면 휴식 타이머가 시작됩니다</p>
      <p class="pomo-alert-time" id="pomoAlertTime">0:30</p>
    </div>
  </div>
  <aside id="pomoBreak" class="pomo-break" hidden aria-live="polite">
    <p class="pomo-break-label" id="pomoBreakLabel">휴식</p>
    <p class="pomo-break-time" id="pomoBreakTime">5:00</p>
    <p class="pomo-break-hint" id="pomoBreakHint">F — 바로 읽기 재개</p>
  </aside>

  <script src="/static/app.js" defer></script>
</body>
</html>
